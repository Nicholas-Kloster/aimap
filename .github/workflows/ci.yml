name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Build
        run: go build -o aimap .

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -timeout 5m ./...

      - name: Verify -version reports const
        run: |
          ACTUAL=$(./aimap -version)
          EXPECTED="aimap $(grep -oE 'const Version = "[^"]+"' version.go | grep -oE '"[^"]+"' | tr -d '"')"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "FAIL: -version output ($ACTUAL) does not match version.go ($EXPECTED)"
            exit 1
          fi
          echo "OK: $ACTUAL"

  cross-platform-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags "-s -w" -o aimap-${{ matrix.goos }}-${{ matrix.goarch }} .
